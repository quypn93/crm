<div class="app-container" [class.sidebar-collapsed]="isSidebarCollapsed" [class.mobile-sidebar-open]="isMobileSidebarOpen">
  <app-sidebar [isCollapsed]="isSidebarCollapsed" [isOpen]="isMobileSidebarOpen"></app-sidebar>

  <div class="sidebar-backdrop" *ngIf="isMobileSidebarOpen" (click)="closeMobileSidebar()"></div>

  <div class="main-content">
    <app-header (toggleSidebar)="toggleSidebar()"></app-header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
<app-toast-container></app-toast-container>
<app-chat-widget></app-chat-widget>

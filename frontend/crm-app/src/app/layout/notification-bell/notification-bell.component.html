<div class="notification-bell">
  <button class="bell-button" (click)="toggleDropdown($event)" aria-label="Thông báo">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
    </svg>
    <span class="bell-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
  </button>

  <div class="dropdown" *ngIf="isOpen" (click)="$event.stopPropagation()">
    <div class="dropdown-header">
      <span class="title">Thông báo</span>
      <button class="link-button" (click)="onMarkAllRead($event)" *ngIf="unreadCount > 0">Đánh dấu tất cả đã đọc</button>
    </div>

    <div class="dropdown-body">
      <div class="loading" *ngIf="loading">Đang tải...</div>

      <div class="empty" *ngIf="!loading && notifications.length === 0">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
        </svg>
        <p>Chưa có thông báo nào</p>
      </div>

      <button
        *ngFor="let n of notifications"
        class="item"
        [class.unread]="!n.isRead"
        (click)="onNotificationClick(n, $event)"
      >
        <div class="item-icon" [attr.data-icon]="iconForType(n.type)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path *ngIf="iconForType(n.type) === 'inbox'" d="M22 12h-6l-2 3h-4l-2-3H2"></path>
            <path *ngIf="iconForType(n.type) === 'inbox'" d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
            <ng-container *ngIf="iconForType(n.type) === 'clock'">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </ng-container>
            <ng-container *ngIf="iconForType(n.type) === 'alert'">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </ng-container>
            <polyline *ngIf="iconForType(n.type) === 'check'" points="20 6 9 17 4 12"></polyline>
            <ng-container *ngIf="iconForType(n.type) === 'bell'">
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
              <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
            </ng-container>
          </svg>
        </div>
        <div class="item-body">
          <div class="item-title">{{ n.title }}</div>
          <div class="item-message">{{ n.message }}</div>
          <div class="item-time">{{ formatTimeAgo(n.createdAt) }}</div>
        </div>
        <span class="unread-dot" *ngIf="!n.isRead"></span>
      </button>
    </div>

    <div class="dropdown-footer" *ngIf="notifications.length > 0">
      <button class="link-button" (click)="onViewAll($event)">Xem tất cả</button>
    </div>
  </div>
</div>

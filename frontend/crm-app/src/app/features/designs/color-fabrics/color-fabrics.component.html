<div class="color-fabrics">
  <div class="page-header">
    <div class="header-left">
      <button class="btn-back" (click)="goBack()">← Quay lại</button>
      <h1>Quản lý Màu vải</h1>
    </div>
    <button class="btn btn-primary" (click)="openAddForm()">+ Thêm màu vải</button>
  </div>

  <div class="loading" *ngIf="isLoading">Đang tải...</div>

  <div class="table-container" *ngIf="!isLoading">
    <table class="data-table">
      <thead>
        <tr>
          <th>Tên màu vải</th>
          <th>Mô tả</th>
          <th>Ngày tạo</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let fabric of colorFabrics">
          <td>{{ fabric.name }}</td>
          <td>{{ fabric.description || '-' }}</td>
          <td>{{ fabric.createdAt | date:'dd/MM/yyyy' }}</td>
          <td class="actions">
            <button class="btn-icon" title="Sửa" (click)="openEditForm(fabric)">✏️</button>
            <button class="btn-icon btn-danger" title="Xóa" (click)="deleteColorFabric(fabric)">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="colorFabrics.length === 0">
          <td colspan="4" class="no-data">Chưa có màu vải nào</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Form Modal -->
  <div class="modal-overlay" *ngIf="showForm" (click)="closeForm()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2>{{ isEditing ? 'Sửa màu vải' : 'Thêm màu vải' }}</h2>
      <div class="form-group">
        <label for="name">Tên màu vải *</label>
        <input type="text" id="name" [(ngModel)]="formData.name" />
      </div>
      <div class="form-group">
        <label for="description">Mô tả</label>
        <input type="text" id="description" [(ngModel)]="formData.description" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="closeForm()">Hủy</button>
        <button class="btn btn-primary" (click)="saveColorFabric()" [disabled]="!formData.name.trim()">
          {{ isEditing ? 'Cập nhật' : 'Thêm' }}
        </button>
      </div>
    </div>
  </div>
</div>

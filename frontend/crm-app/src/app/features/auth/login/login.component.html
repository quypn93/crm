<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <h1>Đăng nhập</h1>
      <p>Chào mừng trở lại! Vui lòng đăng nhập để tiếp tục.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="name@company.com"
          [class.error]="f['email'].touched && f['email'].invalid">
        <div class="error-message" *ngIf="f['email'].touched && f['email'].errors?.['required']">
          Email là bắt buộc
        </div>
        <div class="error-message" *ngIf="f['email'].touched && f['email'].errors?.['email']">
          Email không hợp lệ
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Nhập mật khẩu"
          [class.error]="f['password'].touched && f['password'].invalid">
        <div class="error-message" *ngIf="f['password'].touched && f['password'].errors?.['required']">
          Mật khẩu là bắt buộc
        </div>
        <div class="error-message" *ngIf="f['password'].touched && f['password'].errors?.['minlength']">
          Mật khẩu phải có ít nhất 6 ký tự
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox">
          <span>Ghi nhớ đăng nhập</span>
        </label>
        <a href="#" class="forgot-link">Quên mật khẩu?</a>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="!isLoading">Đăng nhập</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Chưa có tài khoản? <a routerLink="/auth/register">Đăng ký ngay</a></p>
    </div>
  </div>
</div>

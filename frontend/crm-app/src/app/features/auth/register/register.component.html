<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <h1>Đăng ký</h1>
      <p>Tạo tài khoản để bắt đầu sử dụng CRM</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Họ</label>
          <input
            type="text"
            id="firstName"
            formControlName="firstName"
            placeholder="Nguyễn"
            [class.error]="f['firstName'].touched && f['firstName'].invalid">
          <div class="error-message" *ngIf="f['firstName'].touched && f['firstName'].errors?.['required']">
            Họ là bắt buộc
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Tên</label>
          <input
            type="text"
            id="lastName"
            formControlName="lastName"
            placeholder="Văn A"
            [class.error]="f['lastName'].touched && f['lastName'].invalid">
          <div class="error-message" *ngIf="f['lastName'].touched && f['lastName'].errors?.['required']">
            Tên là bắt buộc
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="name@company.com"
          [class.error]="f['email'].touched && f['email'].invalid">
        <div class="error-message" *ngIf="f['email'].touched && f['email'].errors?.['required']">
          Email là bắt buộc
        </div>
        <div class="error-message" *ngIf="f['email'].touched && f['email'].errors?.['email']">
          Email không hợp lệ
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Số điện thoại</label>
        <input
          type="tel"
          id="phoneNumber"
          formControlName="phoneNumber"
          placeholder="0901234567">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Nhập mật khẩu"
          [class.error]="f['password'].touched && f['password'].invalid">
        <div class="error-message" *ngIf="f['password'].touched && f['password'].errors?.['required']">
          Mật khẩu là bắt buộc
        </div>
        <div class="error-message" *ngIf="f['password'].touched && f['password'].errors?.['minlength']">
          Mật khẩu phải có ít nhất 6 ký tự
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Nhập lại mật khẩu"
          [class.error]="f['confirmPassword'].touched && f['confirmPassword'].invalid">
        <div class="error-message" *ngIf="f['confirmPassword'].touched && f['confirmPassword'].errors?.['required']">
          Xác nhận mật khẩu là bắt buộc
        </div>
        <div class="error-message" *ngIf="f['confirmPassword'].touched && f['confirmPassword'].errors?.['mismatch']">
          Mật khẩu không khớp
        </div>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="!isLoading">Đăng ký</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Đã có tài khoản? <a routerLink="/auth/login">Đăng nhập</a></p>
    </div>
  </div>
</div>

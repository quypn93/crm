<div class="page-container">
  <div class="page-header">
    <h1>{{ title }}</h1>
    <button class="btn btn-primary" (click)="openAdd()">+ Thêm mới</button>
  </div>

  <div class="table-container">
    <div class="loading-overlay" *ngIf="isLoading"><div class="spinner"></div></div>
    <table class="data-table">
      <thead>
        <tr>
          <th>Tên</th>
          <th class="actions-col">Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.name }}</td>
          <td class="actions-col">
            <div class="action-buttons">
              <button class="btn-icon" title="Sửa" (click)="openEdit(item)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn-icon btn-danger" title="Xóa" (click)="delete(item)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="items.length === 0 && !isLoading">
          <td colspan="2" class="empty-state">
            <p>Chưa có dữ liệu. Nhấn "+ Thêm mới" để bắt đầu.</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" *ngIf="showForm" (click)="closeForm()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editingItem ? 'Chỉnh sửa' : 'Thêm mới' }} {{ title }}</h3>
      <button class="btn-close" (click)="closeForm()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Tên *</label>
        <input type="text" [(ngModel)]="inputName" [placeholder]="placeholder" (keyup.enter)="save()">
      </div>
      <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="closeForm()">Hủy</button>
      <button class="btn btn-primary" (click)="save()">Lưu</button>
    </div>
  </div>
</div>

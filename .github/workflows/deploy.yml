name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/crm-app/package-lock.json

      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Publish backend
        working-directory: backend
        run: dotnet publish CRM.API -c Release -o ./publish --no-restore --nologo

      - name: Install frontend dependencies
        working-directory: frontend/crm-app
        run: npm ci

      - name: Build frontend
        working-directory: frontend/crm-app
        run: npm run build -- --configuration production

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          rsync -avz --delete \
            --exclude 'wwwroot/uploads' \
            backend/publish/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/crm-api/

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            frontend/crm-app/dist/crm-app/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/crm-web/

      - name: Restart backend service
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo systemctl restart crm-api && sleep 3 && sudo systemctl status crm-api --no-pager | head -15"

      - name: Smoke test
        run: |
          sleep 5
          # Frontend: expect 200
          FE=$(curl -sS -o /dev/null -w "%{http_code}" https://crm.xanhuniform.com/)
          echo "Frontend: HTTP $FE"
          [ "$FE" = "200" ] || exit 1

          # API login with bogus creds: expect 401 (API alive + rejecting auth)
          API=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST https://crm.xanhuniform.com/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke","password":"test"}')
          echo "API: HTTP $API"
          [ "$API" = "401" ] || [ "$API" = "400" ] || exit 1

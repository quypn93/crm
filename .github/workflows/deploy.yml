name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/crm-app/package-lock.json

      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Publish backend
        working-directory: backend
        run: dotnet publish CRM.API -c Release -o ./publish --no-restore --nologo

      - name: Install frontend dependencies
        working-directory: frontend/crm-app
        run: npm ci

      - name: Build frontend (xanhuniform)
        working-directory: frontend/crm-app
        run: npm run build -- --configuration production

      - name: Stash xanhuniform frontend build
        run: |
          mv frontend/crm-app/dist/crm-app frontend/crm-app/dist/xanhuniform

      - name: Build frontend (crmsolution)
        working-directory: frontend/crm-app
        run: npm run build -- --configuration crmsolution

      - name: Stash crmsolution frontend build
        run: |
          mv frontend/crm-app/dist/crm-app frontend/crm-app/dist/crmsolution

      - name: Prepare backend publish for crmsolution
        # Cùng publish output, chỉ override appsettings.Production.json bằng config crmsolution.
        run: |
          cp -r backend/publish backend/publish-crmsolution
          cp backend/CRM.API/appsettings.Production.crmsolution.json \
             backend/publish-crmsolution/appsettings.Production.json

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add servers to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.SSH_HOST_CRMSOL }} >> ~/.ssh/known_hosts

      # ==================== xanhuniform ====================
      - name: Deploy backend → xanhuniform
        run: |
          rsync -avz --delete \
            --exclude 'wwwroot/uploads' \
            backend/publish/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/crm-api/

      - name: Deploy frontend → xanhuniform
        run: |
          rsync -avz --delete \
            frontend/crm-app/dist/xanhuniform/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/crm-web/

      - name: Restart backend service (xanhuniform)
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -se' <<'REMOTE'
          set -euo pipefail
          sudo systemctl restart crm-api
          for i in {1..30}; do
            if sudo ss -tlnp 2>/dev/null | grep -q '127.0.0.1:5000'; then
              echo "App listening on :5000 after ${i}x2s"
              break
            fi
            sleep 2
          done
          if ! sudo systemctl is-active --quiet crm-api; then
            echo "::error::crm-api service is NOT active"
            sudo systemctl status crm-api --no-pager || true
            sudo journalctl -u crm-api --since "2 minutes ago" --no-pager | tail -120
            exit 1
          fi
          if ! sudo ss -tlnp 2>/dev/null | grep -q '127.0.0.1:5000'; then
            echo "::error::crm-api service active but not listening on :5000"
            sudo journalctl -u crm-api --since "2 minutes ago" --no-pager | tail -120
            exit 1
          fi
          echo "crm-api healthy"
          REMOTE

      - name: Smoke test (xanhuniform)
        run: |
          FE=$(curl -sS -o /dev/null -w "%{http_code}" https://crm.xanhuniform.com/)
          echo "Frontend: HTTP $FE"
          [ "$FE" = "200" ] || exit 1
          API=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST https://crm.xanhuniform.com/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke","password":"test"}')
          echo "API: HTTP $API"
          [ "$API" = "401" ] || [ "$API" = "400" ] || exit 1

      # ==================== crmsolution ====================
      - name: Deploy backend → crmsolution
        run: |
          rsync -avz --delete \
            --exclude 'wwwroot/uploads' \
            backend/publish-crmsolution/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_CRMSOL }}:/var/www/crm-api/

      - name: Deploy frontend → crmsolution
        run: |
          rsync -avz --delete \
            frontend/crm-app/dist/crmsolution/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_CRMSOL }}:/var/www/crm-web/

      - name: Restart backend service (crmsolution)
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_CRMSOL }} 'bash -se' <<'REMOTE'
          set -euo pipefail
          sudo systemctl restart crm-api
          for i in {1..30}; do
            if sudo ss -tlnp 2>/dev/null | grep -q '127.0.0.1:5000'; then
              echo "App listening on :5000 after ${i}x2s"
              break
            fi
            sleep 2
          done
          if ! sudo systemctl is-active --quiet crm-api; then
            echo "::error::crm-api service is NOT active"
            sudo systemctl status crm-api --no-pager || true
            sudo journalctl -u crm-api --since "2 minutes ago" --no-pager | tail -120
            exit 1
          fi
          if ! sudo ss -tlnp 2>/dev/null | grep -q '127.0.0.1:5000'; then
            echo "::error::crm-api service active but not listening on :5000"
            sudo journalctl -u crm-api --since "2 minutes ago" --no-pager | tail -120
            exit 1
          fi
          echo "crm-api healthy"
          REMOTE

      - name: Smoke test (crmsolution)
        run: |
          FE=$(curl -sS -o /dev/null -w "%{http_code}" https://crmsolution.net/)
          echo "Frontend: HTTP $FE"
          [ "$FE" = "200" ] || exit 1
          API=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST https://crmsolution.net/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke","password":"test"}')
          echo "API: HTTP $API"
          [ "$API" = "401" ] || [ "$API" = "400" ] || exit 1
